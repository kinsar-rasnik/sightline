# scripts/sidecars.lock — pinned sidecar binaries. See ADR-0013.
#
# Format: pipe-delimited, one row per (tool, target-triple).
#   name | triple | url | sha256 | binary_name | archive_kind | archive_entry | extracted_sha256
#
# - `name`             : logical sidecar name (yt-dlp, ffmpeg).
# - `triple`           : Rust target triple — matches Tauri's externalBin naming.
# - `url`              : HTTPS download URL. MUST be an immutable release asset.
# - `sha256`           : hex SHA-256 of the downloaded file. Verified BEFORE
#                        extraction or execution — a mismatch aborts bundling.
# - `binary_name`      : expected entrypoint name inside the archive (or the
#                        filename of the download when archive_kind is empty).
# - `archive_kind`     : one of {zip, tar.xz} when the download is an archive;
#                        empty when the download is the binary itself.
# - `archive_entry`    : path inside the archive to the executable we want
#                        (relative, no `..`). Empty when archive_kind is empty.
# - `extracted_sha256` : hex SHA-256 of the installed binary that comes out of
#                        the archive (or empty if not yet pinned — see below).
#                        Enables a fast cache-hit path that verifies an
#                        already-installed binary without re-extracting.
#                        When empty, the script re-extracts from the verified
#                        cached archive on every run (slow but safe).
#
# Comments start with `#`. Blank lines allowed.
#
# See `scripts/bundle-sidecars.sh` / `.ps1` for the consumer, and
# `docs/adr/0013-sidecar-bundling.md` for the refresh procedure.

