name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ------------------------------------------------------------------
  # Fast checks that run once (don't need the matrix)
  # ------------------------------------------------------------------
  checks:
    name: checks (fmt · lint · typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Share the target cache with the `test` matrix to keep cold-start
      # `cargo clippy` from climbing past ~2m 30s. hotfix-ci.md §
      # follow-up #3 flagged this gap.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # pnpm version is resolved from `packageManager` in package.json.
      # Do not pass a `version:` input here — it would conflict and fail
      # with ERR_PNPM_BAD_PM_VERSION. See hotfix-ci.md.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: install linux webview deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      # `cargo clippy` triggers `tauri-build`, which validates every
      # `externalBin` path exists on disk before type-checking the crate.
      # Without the bundled sidecars the clippy step fails with
      # `resource path \`binaries/yt-dlp-…\` doesn't exist`. Bundle first,
      # reuse the same checksum-verified script and per-OS cache as the
      # test matrix. See ADR-0016.
      - name: cache sidecar downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/sightline-sidecars
          key: sidecars-${{ runner.os }}-${{ hashFiles('scripts/sidecars.lock') }}

      - name: bundle sidecars
        shell: bash
        run: ./scripts/bundle-sidecars.sh

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm lint
        run: pnpm lint

      # Phase 5 housekeeping: fail the checks job if any route has an
      # axe-core WCAG 2.1 A/AA violation. Documented exceptions live
      # in docs/a11y-exceptions.md + the ALLOWLIST constant in
      # src/a11y/a11y.test.tsx.
      - name: pnpm a11y
        run: pnpm a11y

  # ------------------------------------------------------------------
  # Test matrix across platforms
  # ------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # pnpm version is resolved from `packageManager` in package.json.
      # Do not pass a `version:` input here — it would conflict and fail
      # with ERR_PNPM_BAD_PM_VERSION. See hotfix-ci.md.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: install linux webview deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Cache the sidecar downloads by the lockfile hash so the huge ffmpeg
      # + yt-dlp binaries aren't refetched on every CI run. Keyed on OS so
      # the cache is per-runner.
      - name: cache sidecar downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/sightline-sidecars
          key: sidecars-${{ runner.os }}-${{ hashFiles('scripts/sidecars.lock') }}

      - name: bundle sidecars (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: ./scripts/bundle-sidecars.sh

      - name: bundle sidecars (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/bundle-sidecars.ps1

      - name: verify sidecars
        shell: bash
        run: ./scripts/verify-sidecars.sh --smoke

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-features

      - name: pnpm test
        run: pnpm test

  # ------------------------------------------------------------------
  # Audit track — informational today, gating in Phase 7
  # ------------------------------------------------------------------
  audit:
    name: audit (cargo · pnpm)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # pnpm version is resolved from `packageManager` in package.json.
      # Do not pass a `version:` input here — it would conflict and fail
      # with ERR_PNPM_BAD_PM_VERSION. See hotfix-ci.md.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      # Informational only until Phase 7 (see ADR-0017). We fail only on
      # *vulnerabilities* (cargo audit's default exit code ≠ 0), not on
      # `unmaintained` or `unsound` warnings that are all transitive through
      # Tauri's GTK3 tree and upstream-blocked.
      #
      # Ignored advisories:
      #   RUSTSEC-2023-0071 — rsa 0.9.10 Marvin Attack, reachable only via
      #   sqlx-mysql. We disable `default-features` on sqlx so sqlx-mysql
      #   is never compiled (verified: `cargo tree -i rsa` returns empty).
      #   The crate stays in Cargo.lock as a dormant optional dep of sqlx,
      #   which is why cargo-audit still flags it. No upstream fix exists.
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod
