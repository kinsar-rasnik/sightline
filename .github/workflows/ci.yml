name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ------------------------------------------------------------------
  # Fast checks that run once (don't need the matrix)
  # ------------------------------------------------------------------
  checks:
    name: checks (fmt · lint · typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # pnpm version is resolved from `packageManager` in package.json.
      # Do not pass a `version:` input here — it would conflict and fail
      # with ERR_PNPM_BAD_PM_VERSION. See hotfix-ci.md.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: install linux webview deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm lint
        run: pnpm lint

  # ------------------------------------------------------------------
  # Test matrix across platforms
  # ------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # pnpm version is resolved from `packageManager` in package.json.
      # Do not pass a `version:` input here — it would conflict and fail
      # with ERR_PNPM_BAD_PM_VERSION. See hotfix-ci.md.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: install linux webview deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-features

      - name: pnpm test
        run: pnpm test

  # ------------------------------------------------------------------
  # Audit track — informational today, gating in Phase 7
  # ------------------------------------------------------------------
  audit:
    name: audit (cargo · pnpm)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # pnpm version is resolved from `packageManager` in package.json.
      # Do not pass a `version:` input here — it would conflict and fail
      # with ERR_PNPM_BAD_PM_VERSION. See hotfix-ci.md.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit --deny warnings

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod
