version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      rust-tokio-stack:
        patterns:
          - "tokio*"
          - "tracing*"
      rust-serde-stack:
        patterns:
          - "serde*"
          - "specta*"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "ci(deps)"
