name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more specific you are, the faster we can help.

  - type: input
    id: version
    attributes:
      label: App version
      description: Menu > Sightline > About, or the version printed at startup.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 14.4 / Windows 11 23H2 / Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Settings -> Twitch API.
        2. Paste client ID and secret.
        3. Click Save.
        4. App crashes.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (redact secrets)
      description: Paste relevant lines from `sightline.log`. Remove tokens.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Self-check
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this on the latest release.
          required: true
